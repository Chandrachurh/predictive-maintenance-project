name: Predictive Maintenance Project

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # Updated version compatible with Node 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r predictive-maintenance-project/requirements.txt

      - name: Debug repository structure
        run: |
          pwd
          echo "---- files ----"
          find . -maxdepth 6 -type f | sort
          echo "---- folders ----"
          find . -maxdepth 6 -type d | sort

      - name: Upload dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predictive-maintenance-project/modelbuilding/data_register.py
