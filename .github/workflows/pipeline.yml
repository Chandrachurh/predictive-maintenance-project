name: Predictive Maintenance Project

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r visit_with_us_mlops/requirements.txt

      - name: Debug repository structure
        run: |
          pwd
          echo "---- files ----"
          find . -maxdepth 6 -type f | sort
          echo "---- folders ----"
          find . -maxdepth 6 -type d | sort

      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python visit_with_us_mlops/modelbuilding/data_register.py
